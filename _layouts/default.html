<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/Projects/sfc.md' | relative_url }}">SFC</a>
          <a href="{{ '/Projects/turtlebot.md' | relative_url }}">TurtleBot</a>
          <a href="{{ '/Projects/pincherx.md' | relative_url }}">PincherX</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <span>© {{ site.time | date: '%Y' }} {{ site.title }}</span>
      </div>
    </footer>
  </body>
</html>
