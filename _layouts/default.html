<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/Assets/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <button class="nav-toggle" aria-label="Toggle navigation" onclick="toggleNav()">
          <span></span><span></span><span></span>
        </button>
        <nav class="nav" id="main-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/Projects/sfc.html' | relative_url }}">SFC</a>
          <a href="{{ '/Projects/rl_locomotion.html' | relative_url }}">RL Locomotion</a>
          <a href="{{ '/Projects/lidar_slam.html' | relative_url }}">LiDAR SLAM</a>
          <a href="{{ '/Projects/turtlebot.html' | relative_url }}">TurtleBot</a>
          <a href="{{ '/Projects/pincherx.html' | relative_url }}">PincherX</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <span>© {{ site.time | date: '%Y' }} {{ site.title }}</span>
      </div>
    </footer>

    <script>
      function toggleNav() {
        const nav = document.getElementById('main-nav');
        const btn = document.querySelector('.nav-toggle');
        nav.classList.toggle('open');
        btn.classList.toggle('open');
      }
      // Close nav when a link is clicked (mobile UX)
      document.querySelectorAll('.nav a').forEach(link => {
        link.addEventListener('click', () => {
          document.getElementById('main-nav').classList.remove('open');
          document.querySelector('.nav-toggle').classList.remove('open');
        });
      });
    </script>
  </body>
</html>
